<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب إدارة</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 16px;
            padding: 2.5rem;
            width: 400px;
            text-align: center;
        }
        h2 { margin-bottom: 0.5rem; color: #d4a853; }
        p { color: #888; margin-bottom: 1.5rem; font-size: 0.9rem; }
        .form-group { margin-bottom: 1rem; text-align: right; }
        label { display: block; margin-bottom: 0.4rem; color: #aaa; font-size: 0.85rem; }
        input {
            width: 100%; padding: 0.8rem 1rem;
            background: #111; border: 1px solid #333;
            border-radius: 8px; color: #fff; font-size: 1rem;
            outline: none; transition: border-color 0.3s;
        }
        input:focus { border-color: #d4a853; }
        button {
            width: 100%; padding: 0.9rem;
            background: linear-gradient(135deg, #d4a853, #b8860b);
            color: #000; border: none; border-radius: 8px;
            font-size: 1rem; font-weight: bold; cursor: pointer;
            margin-top: 0.5rem; transition: opacity 0.3s;
        }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .result {
            margin-top: 1.5rem; padding: 1rem;
            border-radius: 8px; display: none;
            font-size: 0.95rem; line-height: 1.6;
        }
        .result.success { display: block; background: #0a2e0a; border: 1px solid #2e7d32; color: #66bb6a; }
        .result.error { display: block; background: #2e0a0a; border: 1px solid #c62828; color: #ef5350; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔑 إنشاء حساب إدارة</h2>
        <p>أدخل بيانات الحساب الجديد لتسجيل مدير في Firebase</p>

        <div class="form-group">
            <label>البريد الإلكتروني</label>
            <input type="email" id="email" placeholder="admin@example.com">
        </div>
        <div class="form-group">
            <label>كلمة المرور (6 أحرف على الأقل)</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button id="create-btn">إنشاء الحساب</button>

        <div class="result" id="result"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA0e0eLDnutv9MEcbJDcQdHkKfbKJ8stpg",
            authDomain: "walida-29959.firebaseapp.com",
            projectId: "walida-29959",
            storageBucket: "walida-29959.firebasestorage.app",
            messagingSenderId: "675458662515",
            appId: "1:675458662515:web:67e131ed7712ff66cc2a06",
            measurementId: "G-HCJX1W6CZY"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const createBtn = document.getElementById('create-btn');
        const resultDiv = document.getElementById('result');

        createBtn.addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!email || !password) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '❌ يرجى ملء جميع الحقول';
                return;
            }
            if (password.length < 6) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '❌ كلمة المرور يجب أن تكون 6 أحرف على الأقل';
                return;
            }

            createBtn.disabled = true;
            createBtn.textContent = 'جاري الإنشاء...';
            resultDiv.className = 'result';
            resultDiv.style.display = 'none';

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                resultDiv.className = 'result success';
                resultDiv.innerHTML = `
                    ✅ تم إنشاء الحساب بنجاح!<br>
                    📧 البريد: <strong>${userCredential.user.email}</strong><br>
                    🆔 UID: <strong>${userCredential.user.uid}</strong><br><br>
                    يمكنك الآن تسجيل الدخول من <a href="admin.html" style="color:#d4a853;">لوحة التحكم</a>
                `;
            } catch (error) {
                console.error(error);
                let msg = 'حدث خطأ غير متوقع';
                if (error.code === 'auth/email-already-in-use') msg = 'هذا البريد مسجل بالفعل';
                else if (error.code === 'auth/invalid-email') msg = 'البريد الإلكتروني غير صالح';
                else if (error.code === 'auth/weak-password') msg = 'كلمة المرور ضعيفة جداً';
                resultDiv.className = 'result error';
                resultDiv.textContent = `❌ ${msg}`;
            } finally {
                createBtn.disabled = false;
                createBtn.textContent = 'إنشاء الحساب';
            }
        });
    </script>
</body>
</html>
